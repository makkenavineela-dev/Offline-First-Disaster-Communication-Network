version: '3.8'

services:
  backend:
    build: .
    restart: always
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
    networks:
      - resq-network

  mongo:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - resq-network

volumes:
  mongo-data:

networks:
  resq-network:
    driver: bridge
