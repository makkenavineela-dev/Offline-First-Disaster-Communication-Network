<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>RESQ — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --red: #FF1F1F; --amber: #FFAA00; --green: #00E676; --blue: #2979FF;
    --white: #F5F5F0; --black: #0A0A0A; --gray: #141414;
    --gray2: #1E1E1E; --gray3: #2A2A2A; --text-muted: #666;
  }
  html, body { height: 100%; background: #080808; font-family: 'Barlow', sans-serif; }
  .phone {
    width: 100%; height: 100%; background: var(--black);
    display: flex; flex-direction: column; overflow: hidden; position: relative;
  }

  /* HEADER */
  .header {
    padding: max(4px, env(safe-area-inset-top)) 16px 12px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    border-bottom: 1px solid var(--gray3);
    background: rgba(10,10,10,0.95); backdrop-filter: blur(10px);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--gray2); display: flex; align-items: center; justify-content: center;
    cursor: pointer; text-decoration: none; flex-shrink: 0;
  }
  .back-btn svg { width: 18px; height: 18px; fill: var(--white); }
  .header-info { flex: 1; }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 900; color: var(--white); letter-spacing: 1px;
  }
  .header-sub { font-size: 11px; color: var(--green); margin-top: 1px; }
  .ai-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    display: inline-block; margin-right: 5px;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,31,31,0.2), rgba(41,121,255,0.2));
    border: 1px solid rgba(255,31,31,0.3);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scrollbar-width: none;
  }
  .chat-area::-webkit-scrollbar { display: none; }

  /* MESSAGES */
  .msg { display: flex; gap: 8px; max-width: 88%; animation: msgIn 0.25s ease; }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .msg.bot .msg-avatar { background: linear-gradient(135deg, #1a0a0a, #0a1a2a); border: 1px solid var(--gray3); }
  .msg.user .msg-avatar { background: var(--gray3); }
  .bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5;
  }
  .msg.bot .bubble {
    background: var(--gray2); border: 1px solid var(--gray3); color: var(--white);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #1a3a1a, #1a2a3a);
    border: 1px solid rgba(41,121,255,0.3); color: var(--white);
    border-bottom-right-radius: 4px;
  }

  /* INTENT BADGE */
  .intent-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px; font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
  }
  .intent-badge.sos     { background: rgba(255,31,31,0.15);   border: 1px solid rgba(255,31,31,0.4);   color: var(--red); }
  .intent-badge.injury  { background: rgba(255,170,0,0.15);   border: 1px solid rgba(255,170,0,0.4);   color: var(--amber); }
  .intent-badge.fire    { background: rgba(255,100,0,0.15);   border: 1px solid rgba(255,100,0,0.4);   color: #FF6400; }
  .intent-badge.flood   { background: rgba(41,121,255,0.15);  border: 1px solid rgba(41,121,255,0.4);  color: var(--blue); }
  .intent-badge.lost    { background: rgba(0,230,118,0.15);   border: 1px solid rgba(0,230,118,0.4);   color: var(--green); }
  .intent-badge.safe    { background: rgba(0,230,118,0.15);   border: 1px solid rgba(0,230,118,0.4);   color: var(--green); }
  .intent-badge.quake   { background: rgba(255,170,0,0.15);   border: 1px solid rgba(255,170,0,0.4);   color: var(--amber); }
  .intent-badge.general { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); }

  /* DECISION TREE CHOICES */
  .choices { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
  .choice-btn {
    background: var(--gray3); border: 1px solid #444; border-radius: 12px;
    padding: 10px 14px; font-size: 13px; color: var(--white); cursor: pointer;
    text-align: left; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.danger  { border-color: rgba(255,31,31,0.4);   color: var(--red); }
  .choice-btn.warning { border-color: rgba(255,170,0,0.4);   color: var(--amber); }
  .choice-btn.ok      { border-color: rgba(0,230,118,0.4);   color: var(--green); }

  /* SOS TRIGGER CARD */
  .sos-trigger {
    background: rgba(255,31,31,0.08); border: 1px solid rgba(255,31,31,0.3);
    border-radius: 14px; padding: 14px 16px; margin-top: 8px;
  }
  .sos-trigger-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
  .sos-trigger-text  { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; margin-bottom: 10px; }
  .sos-trigger-btn {
    width: 100%; padding: 12px; border-radius: 12px; border: none;
    background: var(--red); color: white; font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,31,31,0.4);
  }

  /* STEPS LIST */
  .steps { display: flex; flex-direction: column; gap: 7px; margin-top: 8px; }
  .step-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--gray3);
    border-radius: 10px; padding: 10px 12px;
  }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%; background: var(--gray3);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--white); flex-shrink: 0;
  }
  .step-num.urgent { background: rgba(255,31,31,0.3); color: var(--red); }
  .step-text { font-size: 13px; color: var(--white); line-height: 1.4; }

  /* TYPING INDICATOR */
  .typing { display: flex; gap: 4px; padding: 14px 16px; align-items: center; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
    animation: typing 1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* INPUT BAR */
  .input-bar {
    flex-shrink: 0; padding: 10px 16px max(14px, env(safe-area-inset-bottom));
    background: rgba(10,10,10,0.95); border-top: 1px solid var(--gray3);
    display: flex; align-items: flex-end; gap: 10px;
  }
  .input-wrap {
    flex: 1; background: var(--gray2); border: 1px solid var(--gray3);
    border-radius: 20px; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: rgba(41,121,255,0.5); }
  .msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--white); font-family: 'Barlow', sans-serif; font-size: 14px;
    resize: none; max-height: 80px; line-height: 1.4;
  }
  .msg-input::placeholder { color: var(--text-muted); }
  .voice-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gray3); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.2s;
  }
  .voice-btn svg { width: 18px; height: 18px; fill: var(--text-muted); }
  .voice-btn.listening { background: rgba(255,31,31,0.2); animation: pulse-ring 1s ease-in-out infinite; }
  .voice-btn.listening svg { fill: var(--red); }
  @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 rgba(255,31,31,0.4)} 50%{box-shadow:0 0 0 8px rgba(255,31,31,0)} }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--blue); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(41,121,255,0.4);
    transition: transform 0.1s;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* QUICK PROMPTS */
  .quick-prompts {
    flex-shrink: 0; padding: 0 12px 8px;
    display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none;
  }
  .quick-prompts::-webkit-scrollbar { display: none; }
  .qp {
    flex-shrink: 0; padding: 6px 12px; border-radius: 100px;
    background: var(--gray2); border: 1px solid var(--gray3);
    font-size: 12px; color: var(--text-muted); cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .qp:active { border-color: var(--blue); color: var(--blue); }
</style>
<link rel="manifest" href="/manifest.json">
</head>
<body>
<div class="phone">
  <div class="header">
    <a href="/dashboard/index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="header-info">
      <div class="header-title">RESQ AI</div>
      <div class="header-sub"><span class="ai-dot"></span>Offline · Always Ready</div>
    </div>
    <div class="header-icon">🤖</div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="quick-prompts" id="quickPrompts">
    <div class="qp" onclick="sendQuick('I need help urgently')">🆘 Need Help</div>
    <div class="qp" onclick="sendQuick('I am bleeding badly')">🩸 Bleeding</div>
    <div class="qp" onclick="sendQuick('There is a fire nearby')">🔥 Fire</div>
    <div class="qp" onclick="sendQuick('I am trapped')">🏚️ Trapped</div>
    <div class="qp" onclick="sendQuick('Flood water is rising')">🌊 Flood</div>
    <div class="qp" onclick="sendQuick('I am lost and cannot find my way')">📍 Lost</div>
    <div class="qp" onclick="sendQuick('Someone is unconscious')">😵 Unconscious</div>
    <div class="qp" onclick="sendQuick('Earthquake happened')">🌍 Earthquake</div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea class="msg-input" id="msgInput" rows="1"
        placeholder="Describe your emergency…"
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  INTENT CLASSIFIER  (pure JS, 0 MB)
// ═══════════════════════════════════════
const INTENTS = [
  {
    id: 'SOS_EMERGENCY',
    emoji: '🆘',
    label: 'SOS Emergency',
    badgeClass: 'sos',
    keywords: {
      'help':10,'emergency':10,'save me':15,'save':8,'dying':15,'die':12,
      'life':8,'critical':10,'danger':10,'rescue':10,'trapped':9,'urgent':8,
      'please help':15,'sos':15
    }
  },
  {
    id: 'INJURY',
    emoji: '🩸',
    label: 'Injury',
    badgeClass: 'injury',
    keywords: {
      'bleeding':12,'blood':10,'hurt':8,'pain':8,'injured':10,'wound':10,
      'broken':8,'fracture':10,'cut':7,'burn':9,'burned':9,'chest pain':12,
      'unconscious':12,'not breathing':15,'heart':8,'attack':10
    }
  },
  {
    id: 'FIRE',
    emoji: '🔥',
    label: 'Fire',
    badgeClass: 'fire',
    keywords: {
      'fire':12,'smoke':10,'burning':10,'flame':10,'burn':8,'blaze':12,
      'on fire':15,'fire department':10,'building fire':12
    }
  },
  {
    id: 'FLOOD',
    emoji: '🌊',
    label: 'Flood',
    badgeClass: 'flood',
    keywords: {
      'flood':12,'water rising':15,'drowning':15,'drown':12,'river':8,
      'water':6,'rain':5,'submerged':12,'swept':10,'boat':6
    }
  },
  {
    id: 'EARTHQUAKE',
    emoji: '🌍',
    label: 'Earthquake',
    badgeClass: 'quake',
    keywords: {
      'earthquake':15,'tremor':12,'quake':12,'shaking':10,'collapsed':10,
      'building fell':15,'rubble':12,'debris':10,'aftershock':12
    }
  },
  {
    id: 'LOST',
    emoji: '📍',
    label: 'Lost / Navigation',
    badgeClass: 'lost',
    keywords: {
      'lost':12,'cant find':10,'where am i':15,'navigation':8,'direction':7,
      'location':6,'find me':10,'cannot find':10,'dont know where':12
    }
  }
];

function classifyIntent(text) {
  const lower = text.toLowerCase();
  let best = { id: 'GENERAL', score: 0, intent: null };
  for (const intent of INTENTS) {
    let score = 0;
    for (const [kw, weight] of Object.entries(intent.keywords)) {
      if (lower.includes(kw)) score += weight;
    }
    if (score > best.score) best = { id: intent.id, score, intent };
  }
  return best.score >= 7 ? best.intent : null;
}

// ═══════════════════════════════════════
//  DECISION TREE  (pure JS, 0 MB)
// ═══════════════════════════════════════
const DECISION_TREES = {

    ],
    sos: false
  }
};

// ═══════════════════════════════════════
//  AI RESPONSE ENGINE
// ═══════════════════════════════════════
const RESPONSES = {
  SOS_EMERGENCY: {
    text: "I've detected a critical emergency. Let me guide you step by step. What type of emergency are you facing?",
    tree: 'SOS_TYPE'
  },
  FIRE: {
    text: "🔥 Fire emergency detected. Let me guide you.",
    tree: 'FIRE'
  },
  FLOOD: {
    text: "🌊 Flood situation detected. Let me assess your situation.",
    tree: 'FLOOD'
  },

  },

    tree: 'EARTHQUAKE'
  },

    text: "📍 You're lost. Here are the critical steps to stay safe and get found.",

const SOS_TYPE_TREE = {
  q: 'Select your emergency type:',
  choices: [
    { label: '🩸 Medical / Injury', next: 'INJURY' },
    { label: '🔥 Fire', next: 'FIRE' },
    { label: '🌊 Flood', next: 'FLOOD' },
    { label: '🌍 Earthquake', next: 'EARTHQUAKE' },
    { label: '📍 Lost / Trapped', next: 'LOST' }
  ]
};

// ═══════════════════════════════════════
//  CHAT ENGINE
// ═══════════════════════════════════════
const chatArea = document.getElementById('chatArea');
let voiceRecognition = null;
let isListening = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function scrollBottom() {
  setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 100);
}

function addMsg(html, from = 'bot') {
  const avatar = from === 'bot' ? '🤖' : '👤';
  const div = document.createElement('div');
  div.className = `msg ${from}`;
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="bubble">${html}</div>
  `;
  chatArea.appendChild(div);
  scrollBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function renderTree(nodeId) {
  const node = nodeId === 'SOS_TYPE' ? SOS_TYPE_TREE : DECISION_TREES[nodeId];
  if (!node) return '';
  if (node.q) {
    const choicesHtml = node.choices.map(c => `
      <button class="choice-btn ${c.cls || ''}" onclick="choiceSelected('${c.next}', this)">
        ${c.label}
      </button>`).join('');
    return `<div style="margin-top:8px;font-size:13px;color:var(--text-muted);margin-bottom:6px;">${node.q}</div>
            <div class="choices">${choicesHtml}</div>`;
  }
  if (node.steps) {
    const stepsHtml = node.steps.map((s, i) => `
      <div class="step-item">
        <div class="step-num ${s.urgent ? 'urgent' : ''}">${i + 1}</div>
        <div class="step-text">${s.text}</div>
      </div>`).join('');
    const sosPart = node.sos ? `
      <div class="sos-trigger">
        <div class="sos-trigger-title">⚠️ SOS RECOMMENDED</div>
        <div class="sos-trigger-text">This situation may require immediate rescue. Broadcast emergency signal?</div>
        <button class="sos-trigger-btn" onclick="goSOS()">🆘 SEND SOS SIGNAL</button>
      </div>` : '';
    return `<div class="steps">${stepsHtml}</div>${sosPart}`;
  }
  return '';
}

function choiceSelected(nextNode, btn) {
  // Disable all buttons in this bubble
  btn.closest('.bubble').querySelectorAll('.choice-btn').forEach(b => {
    b.style.opacity = '0.4';
    b.style.pointerEvents = 'none';
  });
  btn.style.opacity = '1';
  btn.style.borderColor = 'rgba(41,121,255,0.6)';
  btn.style.color = 'var(--white)';

  addMsg(btn.textContent.trim(), 'user');
  showTyping();
  setTimeout(() => {
    removeTyping();
    const node = nextNode === 'SOS_TYPE' ? SOS_TYPE_TREE : DECISION_TREES[nextNode];
    if (!node) return;
    let label = nextNode.replace(/_/g, ' ');
    addMsg(renderTree(nextNode));
  }, 600);
}

function goSOS() {
  window.location.href = '/sos/index.html';
}

function processInput(text) {
  if (!text.trim()) return;
  addMsg(text.trim(), 'user');
  document.getElementById('msgInput').value = '';
  document.getElementById('msgInput').style.height = 'auto';

  showTyping();

  setTimeout(() => {
    removeTyping();
    const intent = classifyIntent(text);

    if (!intent) {
      // General help
      addMsg(`I'm here to help in emergencies. Describe your situation and I'll guide you with first aid steps, evacuation routes, or send an SOS signal.<br><br>You can also use the quick buttons below. 👇`);
      return;
    }

    const badgeHtml = `<div class="intent-badge ${intent.badgeClass}">${intent.emoji} ${intent.label} Detected</div>`;
    const resp = RESPONSES[intent.id];

    if (resp) {
      const treeHtml = resp.tree ? renderTree(resp.tree) : '';
      addMsg(`${badgeHtml}${resp.text}${treeHtml}`);
    } else {
      addMsg(`${badgeHtml}I understand this is a serious situation. ${renderTree(intent.id)}`);
    }
  }, 900);
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  processInput(input.value);
}

function sendQuick(text) {
  processInput(text);
}

// ═══════════════════════════════════════
//  VOICE INPUT  (Web Speech API, 0 MB)
// ═══════════════════════════════════════
function toggleVoice() {
  const btn = document.getElementById('voiceBtn');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addMsg('Voice input is not supported on this device. Please type your message.');
    return;
  }
  if (isListening) {
    voiceRecognition && voiceRecognition.stop();
    return;
  }
  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'en-US';
  voiceRecognition.interimResults = false;
  voiceRecognition.maxAlternatives = 1;

  voiceRecognition.onstart = () => {
    isListening = true;
    btn.classList.add('listening');
    addMsg('🎙️ <em style="color:var(--text-muted)">Listening… speak now</em>');
  };
  voiceRecognition.onresult = (e) => {
    const spoken = e.results[0][0].transcript;
    // Remove the "listening" message
    const msgs = chatArea.querySelectorAll('.msg.bot');
    msgs[msgs.length - 1].remove();
    processInput(spoken);
  };
  voiceRecognition.onerror = () => {
    const msgs = chatArea.querySelectorAll('.msg.bot');
    msgs[msgs.length - 1].remove();
    addMsg('Could not hear clearly. Please try again or type your message.');
  };
  voiceRecognition.onend = () => {
    isListening = false;
    btn.classList.remove('listening');
    voiceRecognition = null;
  };
  voiceRecognition.start();
}
