<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>RESQ — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --red:#FF1F1F; --amber:#FFAA00; --green:#00E676; --blue:#2979FF;
    --white:#F5F5F0; --black:#0A0A0A; --gray2:#1E1E1E; --gray3:#2A2A2A; --muted:#666;
  }
  html,body { height:100%; background:#080808; font-family:'Barlow',sans-serif; }
  .phone { width:100%; height:100%; background:var(--black); display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  .hdr {
    padding:max(4px,env(safe-area-inset-top)) 16px 10px;
    display:flex; align-items:center; gap:12px; flex-shrink:0;
    border-bottom:1px solid var(--gray3);
    background:rgba(10,10,10,0.97); backdrop-filter:blur(10px);
  }
  .back { width:36px; height:36px; border-radius:10px; background:var(--gray2);
    display:flex; align-items:center; justify-content:center; text-decoration:none; flex-shrink:0; }
  .back svg { width:18px; height:18px; fill:var(--white); }
  .hdr-info { flex:1; }
  .hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; color:var(--white); }
  .hdr-sub { font-size:10px; color:var(--green); margin-top:1px; display:flex; align-items:center; gap:5px; }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .hdr-badge {
    padding:4px 10px; border-radius:100px; font-size:10px; font-weight:700; letter-spacing:1px;
    background:rgba(41,121,255,0.15); border:1px solid rgba(41,121,255,0.4); color:var(--blue);
  }

  /* CHAT */
  .chat { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px; scrollbar-width:none; }
  .chat::-webkit-scrollbar { display:none; }
  .row { display:flex; gap:8px; max-width:92%; animation:msgIn .2s ease; }
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .row.bot { align-self:flex-start; }
  .row.user { align-self:flex-end; flex-direction:row-reverse; }
  .av { width:30px; height:30px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:15px; }
  .row.bot .av { background:var(--gray2); border:1px solid var(--gray3); }
  .row.user .av { background:var(--gray3); }
  .bub { padding:10px 13px; border-radius:14px; font-size:13.5px; line-height:1.55; white-space:pre-wrap; }
  .row.bot .bub { background:var(--gray2); border:1px solid var(--gray3); color:var(--white); border-bottom-left-radius:3px; }
  .row.user .bub { background:linear-gradient(135deg,#1a3060,#102040); border:1px solid rgba(41,121,255,0.3); color:var(--white); border-bottom-right-radius:3px; }

  /* NLP TAG */
  .nlp-tag { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:100px;
    font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; margin-bottom:5px; }
  .t-sos    { background:rgba(255,31,31,.15);   border:1px solid rgba(255,31,31,.4);   color:var(--red); }
  .t-injury { background:rgba(255,170,0,.15);   border:1px solid rgba(255,170,0,.4);   color:var(--amber); }
  .t-fire   { background:rgba(255,100,0,.15);   border:1px solid rgba(255,100,0,.4);   color:#FF6400; }
  .t-flood  { background:rgba(41,121,255,.15);  border:1px solid rgba(41,121,255,.4);  color:var(--blue); }
  .t-quake  { background:rgba(255,170,0,.15);   border:1px solid rgba(255,170,0,.4);   color:var(--amber); }
  .t-ok     { background:rgba(0,230,118,.1);    border:1px solid rgba(0,230,118,.3);   color:var(--green); }
  .conf-bar { height:3px; border-radius:2px; margin-top:6px; margin-bottom:2px; background:var(--gray3); overflow:hidden; }
  .conf-fill { height:100%; background:var(--green); transition:width .5s; }

  /* SOS CARD */
  .sos-card { background:rgba(255,31,31,.08); border:1px solid rgba(255,31,31,.3); border-radius:12px; padding:12px 14px; margin-top:8px; }
  .sos-card-title { font-size:12px; font-weight:700; color:var(--red); margin-bottom:4px; }
  .sos-card-btn { width:100%; padding:11px; border-radius:10px; border:none;
    background:var(--red); color:white; font-family:'Barlow Condensed',sans-serif;
    font-size:15px; font-weight:900; letter-spacing:2px; cursor:pointer; margin-top:8px; }

  /* CHOICES */
  .choices { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  .ch { background:var(--gray3); border:1px solid #444; border-radius:10px;
    padding:9px 12px; font-size:13px; color:var(--white); cursor:pointer; text-align:left; transition:all .15s; }
  .ch:active { transform:scale(.98); }
  .ch.danger { border-color:rgba(255,31,31,.4); }
  .ch.ok { border-color:rgba(0,230,118,.4); }

  /* TYPING */
  .typing { display:flex; gap:4px; padding:12px 14px; align-items:center; }
  .typing span { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:typ 1s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes typ{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  /* INPUT */
  .inp-bar { flex-shrink:0; padding:10px 14px max(12px,env(safe-area-inset-bottom));
    background:rgba(10,10,10,.97); border-top:1px solid var(--gray3); display:flex; align-items:flex-end; gap:9px; }
  .inp-wrap { flex:1; background:var(--gray2); border:1px solid var(--gray3); border-radius:20px;
    padding:9px 13px; display:flex; align-items:center; gap:7px; transition:border-color .2s; }
  .inp-wrap:focus-within { border-color:rgba(41,121,255,.5); }
  .inp { flex:1; background:none; border:none; outline:none; color:var(--white);
    font-family:'Barlow',sans-serif; font-size:14px; resize:none; max-height:80px; line-height:1.4; }
  .inp::placeholder { color:var(--muted); }
  .mic { width:34px; height:34px; border-radius:50%; background:var(--gray3); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
  .mic svg { width:16px; height:16px; fill:var(--muted); }
  .mic.on { background:rgba(255,31,31,.2); animation:pring 1s ease-in-out infinite; }
  .mic.on svg { fill:var(--red); }
  @keyframes pring{0%,100%{box-shadow:0 0 0 0 rgba(255,31,31,.4)}50%{box-shadow:0 0 0 7px rgba(255,31,31,0)}}
  .send { width:42px; height:42px; border-radius:50%; background:var(--blue); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 4px 14px rgba(41,121,255,.4); transition:transform .1s; }
  .send:active { transform:scale(.91); }
  .send svg { width:17px; height:17px; fill:white; }

  /* QUICK PILLS */
  .pills { flex-shrink:0; padding:0 12px 8px; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
  .pills::-webkit-scrollbar { display:none; }
  .pill { flex-shrink:0; padding:6px 11px; border-radius:100px; background:var(--gray2);
    border:1px solid var(--gray3); font-size:12px; color:var(--muted); cursor:pointer; white-space:nowrap; }
  .pill:active { border-color:var(--blue); color:var(--blue); }

  /* NLP LOADING */
  .nlp-ready { display:none; }
  .nlp-loading { font-size:11px; color:var(--muted); text-align:center; padding:6px; }
</style>

      • Breathe OUT for 4 counts
      • Hold for 4 counts — repeat
3️⃣  GROUNDING: Name 5 things you see, 4 you feel, 3 you hear
4️⃣  Sit or lie flat — loosen tight clothing
5️⃣  Do NOT leave the person alone

Panic attacks feel severe but peak at ~10 minutes and pass.`,
    sos: false
  }
];

// ── NLP ENGINE ────────────────────────────────────────────

let nlpReady = false;

function initNLP() {
  if (typeof nlp === 'undefined') {
    document.getElementById('nlpStatus').textContent = 'NLP unavailable — using fallback';
    nlpReady = false;
    return;
  }
  // Pre-warm compromise
  nlp('test sentence to warm up the engine');
  nlpReady = true;
  document.getElementById('nlpStatus').textContent = 'NLP Ready · Offline';
}

function analyzeWithNLP(text) {
  if (!nlpReady || typeof nlp === 'undefined') return { nouns:[], verbs:[], adjectives:[], topics:[] };
  const doc = nlp(text);
  return {
    nouns:      doc.nouns().out('array').map(w => w.toLowerCase()),
    verbs:      doc.verbs().out('array').map(w => w.toLowerCase()),
    adjectives: doc.adjectives().out('array').map(w => w.toLowerCase()),
    topics:     doc.topics().out('array').map(w => w.toLowerCase()),
    isQuestion: doc.questions().length > 0,
    isNegative: doc.sentences().out('array').some(s => nlp(s).match('(not|no|never|cannot|cant|wont|dont)').found)
  };
}

function scoreEntry(entry, text, parsed) {
  const low = text.toLowerCase();
  let score = 0;

  // 1. Direct noun match (NLP-extracted)
  for (const n of parsed.nouns) {
    if (entry.nouns.includes(n)) score += 4;
    if (entry.body.includes(n)) score += 2;
  }
  // 2. Direct verb match (NLP-extracted)
  for (const v of parsed.verbs) {
    if (entry.verbs.some(ev => v.includes(ev) || ev.includes(v))) score += 5;
  }
  // 3. Raw text keyword match (fallback for NLP misses)
  for (const kw of [...entry.nouns, ...entry.verbs, ...entry.body]) {
    if (low.includes(kw)) score += 2;
  }
  // 4. Topic match
  for (const t of parsed.topics) {
    if (entry.nouns.includes(t) || entry.id.includes(t)) score += 3;
  }
  // 5. Partial stem match (e.g. "bleed" matches "bleeding")
  const words = low.split(/\s+/);
  for (const w of words) {
    for (const kw of [...entry.nouns, ...entry.verbs]) {
      if (w.length > 3 && (w.startsWith(kw.slice(0,4)) || kw.startsWith(w.slice(0,4)))) score += 1;
    }
  }
  return score;
}

function findBestMatch(text) {
  const parsed = analyzeWithNLP(text);
  let best = null, bestScore = 0;
  for (const entry of KB) {
    const s = scoreEntry(entry, text, parsed);
    if (s > bestScore) { bestScore = s; best = entry; }
  }
  const confidence = Math.min(100, Math.round((bestScore / 12) * 100));
  return bestScore >= 2 ? { entry: best, confidence, parsed } : { entry: null, confidence: 0, parsed };
}

// ── RESPONSE GENERATOR ────────────────────────────────────

function buildResponse(text) {
  const { entry, confidence, parsed } = findBestMatch(text);

  // Check if it's a follow-up question about previous context
  const lastContext = context.length > 0 ? context[context.length - 1] : null;

  if (!entry) {
    // Check for greetings / general
    const low = text.toLowerCase();
    if (/^(hi|hello|hey|test|works|working|yo|okay|ok)/.test(low)) {
      return { html: buildGreeting(), sos: false };
    }
    if (parsed.isQuestion && lastContext) {
      return { html: `Based on the ${lastContext.label} situation you mentioned:\n\n${lastContext.answer}`, sos: lastContext.sos };
    }
    return { html: buildFallback(parsed), sos: false };
  }

  context.push(entry);
  if (context.length > 5) context.shift();

  const tag = `<div class="nlp-tag ${entry.tag}">${entry.label}</div>`;
  const confHtml = confidence > 0 ? `<div class="conf-bar"><div class="conf-fill" style="width:${confidence}%"></div></div><div style="font-size:10px;color:var(--muted);margin-bottom:6px;">Confidence: ${confidence}%</div>` : '';
  const sosCard = entry.sos ? `<div class="sos-card"><div class="sos-card-title">⚠️ SOS RECOMMENDED</div><div style="font-size:12px;color:rgba(255,255,255,0.7);line-height:1.5;">This situation may need immediate rescue. Broadcast emergency signal?</div><button class="sos-card-btn" onclick="window.location.href='/sos/index.html'">🆘 SEND SOS SIGNAL</button></div>` : '';

  return { html: `${tag}${confHtml}${entry.answer}${sosCard}`, sos: entry.sos };
}

function buildGreeting() {
  const name = localStorage.getItem('resq_name') || '';
  return `👋 Hey${name ? ' ' + name : ''}! I'm RESQ AI — your offline emergency assistant.\n\nI use real NLP to understand what you're saying, even if it's not perfectly worded.\n\nTry describing your situation:\n• "Road metal stuck in my leg"\n• "My friend cannot wake up"\n• "Water coming inside the house"\n• "Building is shaking badly"\n\nI'll give you step-by-step guidance immediately.`;
}

function buildFallback(parsed) {
  let resp = `I need more detail to help you accurately. Try describing:\n\n`;
  if (parsed.nouns.length > 0) resp += `• What happened to: ${parsed.nouns.slice(0,3).join(', ')}\n`;
  resp += `• The type of emergency (fire, flooding, injury, trapped, unconscious)\n• Where the person is hurt (if medical)\n\nOr tap one of the quick buttons below.`;
  return resp;
}

// ── CHAT ENGINE ───────────────────────────────────────────

function addMsg(html, from) {
  const av = from === 'bot' ? '🤖' : '👤';
  const d = document.createElement('div');
  d.className = `row ${from}`;
  d.innerHTML = `<div class="av">${av}</div><div class="bub">${html}</div>`;
  chat.appendChild(d);
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
  return d;
}

function typing() {
  const d = document.createElement('div');
  d.className = 'row bot'; d.id = 'typ';
  d.innerHTML = `<div class="av">🤖</div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}
function rmTyping() { const e = document.getElementById('typ'); if(e) e.remove(); }

function autoH(el) { el.style.height='auto'; el.style.height = Math.min(el.scrollHeight,80)+'px'; }

function ask(text) { process(text); }

function send() {
  const inp = document.getElementById('inp');
  const t = inp.value.trim();
  if (!t) return;
  inp.value = ''; inp.style.height = 'auto';
  process(t);
}

function process(text) {
  addMsg(text, 'user');
  typing();
  // Small delay to feel natural
  const delay = 400 + Math.min(text.length * 8, 800);
  setTimeout(() => {
    rmTyping();
    const { html } = buildResponse(text);
    addMsg(html, 'bot');
  }, delay);
}

// ── VOICE ─────────────────────────────────────────────────

function toggleMic() {
  const btn = document.getElementById('micBtn');
  const SR2 = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR2) { addMsg('Voice input not supported on this device. Please type.', 'bot'); return; }
  if (isListening) { SR && SR.stop(); return; }
  SR = new SR2(); SR.lang = 'en-US'; SR.interimResults = false;
  SR.onstart = () => { isListening = true; btn.classList.add('on'); };
  SR.onresult = (e) => {
    const t = e.results[0][0].transcript;
    process(t);
  };
  SR.onerror = () => { isListening=false; btn.classList.remove('on'); };
  SR.onend = () => { isListening=false; btn.classList.remove('on'); SR=null; };
  SR.start();
}

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initNLP();
  setTimeout(() => {
    addMsg(buildGreeting(), 'bot');
  }, 200);
});
</script>
<script src="../store.js"></script>
