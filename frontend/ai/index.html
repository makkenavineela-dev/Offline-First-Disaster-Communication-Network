<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>RESQ — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--red:#FF1F1F;--amber:#FFAA00;--green:#00E676;--blue:#2979FF;--white:#F5F5F0;--black:#0A0A0A;--g2:#1E1E1E;--g3:#2A2A2A;--muted:#666}
  html,body{height:100%;background:#080808;font-family:'Barlow',sans-serif}
  .phone{width:100%;height:100%;background:var(--black);display:flex;flex-direction:column;overflow:hidden}

  .hdr{padding:max(4px,env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--g3);background:rgba(10,10,10,.97)}
  .back{width:36px;height:36px;border-radius:10px;background:var(--g2);display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0}
  .back svg{width:18px;height:18px;fill:var(--white)}
  .hdr-info{flex:1}
  .hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--white)}
  .hdr-sub{font-size:10px;color:var(--green);margin-top:1px;display:flex;align-items:center;gap:5px}
  .ldot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:bl 2s infinite}
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
  .hdr-badge{padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:1px;background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.4);color:var(--blue)}

  .chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none}
  .chat::-webkit-scrollbar{display:none}
  .row{display:flex;gap:8px;max-width:93%;animation:mi .2s ease}
  @keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .row.bot{align-self:flex-start}
  .row.user{align-self:flex-end;flex-direction:row-reverse}
  .av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
  .row.bot .av{background:var(--g2);border:1px solid var(--g3)}
  .row.user .av{background:var(--g3)}
  .bub{padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.55;white-space:pre-wrap}
  .row.bot .bub{background:var(--g2);border:1px solid var(--g3);color:var(--white);border-bottom-left-radius:3px}
  .row.user .bub{background:linear-gradient(135deg,#1a3060,#102040);border:1px solid rgba(41,121,255,.3);color:var(--white);border-bottom-right-radius:3px}

  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
  .ti{background:rgba(255,170,0,.15);border:1px solid rgba(255,170,0,.4);color:var(--amber)}
  .ts{background:rgba(255,31,31,.15);border:1px solid rgba(255,31,31,.4);color:var(--red)}
  .tf{background:rgba(255,100,0,.15);border:1px solid rgba(255,100,0,.4);color:#FF6400}
  .tw{background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.4);color:var(--blue)}
  .tq{background:rgba(255,170,0,.15);border:1px solid rgba(255,170,0,.4);color:var(--amber)}
  .tok{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--green)}

  .conf{height:3px;border-radius:2px;margin:5px 0 3px;background:var(--g3);overflow:hidden}
  .conf-fill{height:100%;background:var(--green);transition:width .5s}
  .conf-label{font-size:10px;color:var(--muted);margin-bottom:5px}

  .sos-card{background:rgba(255,31,31,.08);border:1px solid rgba(255,31,31,.3);border-radius:12px;padding:12px 14px;margin-top:8px}
  .sos-card-t{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px}
  .sos-btn{width:100%;padding:11px;border-radius:10px;border:none;background:var(--red);color:white;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;cursor:pointer;margin-top:8px}

  .typing{display:flex;gap:4px;padding:12px 14px;align-items:center}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:ty 1s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  .inp-bar{flex-shrink:0;padding:10px 14px max(12px,env(safe-area-inset-bottom));background:rgba(10,10,10,.97);border-top:1px solid var(--g3);display:flex;align-items:flex-end;gap:9px}
  .inp-wrap{flex:1;background:var(--g2);border:1px solid var(--g3);border-radius:20px;padding:9px 13px;display:flex;align-items:center;gap:7px;transition:border-color .2s}
  .inp-wrap:focus-within{border-color:rgba(41,121,255,.5)}
  .inp{flex:1;background:none;border:none;outline:none;color:var(--white);font-family:'Barlow',sans-serif;font-size:14px;resize:none;max-height:80px;line-height:1.4}
  .inp::placeholder{color:var(--muted)}
  .mic{width:34px;height:34px;border-radius:50%;background:var(--g3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
  .mic svg{width:16px;height:16px;fill:var(--muted)}
  .mic.on{background:rgba(255,31,31,.2);animation:pr 1s ease-in-out infinite}
  .mic.on svg{fill:var(--red)}
  @keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(255,31,31,.4)}50%{box-shadow:0 0 0 7px rgba(255,31,31,0)}}
  .send{width:42px;height:42px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(41,121,255,.4);transition:transform .1s}
  .send:active{transform:scale(.91)}
  .send svg{width:17px;height:17px;fill:white}

  .pills{flex-shrink:0;padding:0 12px 8px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex-shrink:0;padding:6px 11px;border-radius:100px;background:var(--g2);border:1px solid var(--g3);font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap}
  .pill:active{border-color:var(--blue);color:var(--blue)}
</style>
<link rel="manifest" href="/manifest.json">
</head>
<body>
<div class="phone">
  <div class="hdr">
    <a href="/dashboard/index.html" class="back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="hdr-info">
      <div class="hdr-title">RESQ AI</div>
      <div class="hdr-sub"><span class="ldot"></span><span id="nlpSt">Loading NLP…</span></div>
    </div>
    <div class="hdr-badge">OFFLINE</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="pills">
    <div class="pill" onclick="ask(\"i cant breathe\")">🫁 Can't Breathe</div>
    <div class="pill" onclick="ask(\"I am bleeding badly\")">🩸 Bleeding</div>
    <div class="pill" onclick="ask(\"chest pain heart attack\")">❤️ Chest Pain</div>
    <div class="pill" onclick="ask(\"there is fire and smoke\")">🔥 Fire/Smoke</div>
    <div class="pill" onclick="ask(\"flood water rising\")">🌊 Flood</div>
    <div class="pill" onclick="ask(\"building collapsed earthquake\")">🌍 Earthquake</div>
    <div class="pill" onclick="ask(\"someone unconscious not moving\")">😵 Unconscious</div>
    <div class="pill" onclick="ask(\"I am trapped inside\")">🏚️ Trapped</div>
    <div class="pill" onclick="ask(\"severe burn on skin\")">🔥 Burns</div>
    <div class="pill" onclick="ask(\"broken bone fracture\")">🦴 Fracture</div>
    <div class="pill" onclick="ask(\"snake bite on hand\")">🐍 Snake Bite</div>
    <div class="pill" onclick="ask(\"having a seizure\")">⚡ Seizure</div>
    <div class="pill" onclick="ask(\"allergic reaction swollen\")">🐝 Allergy</div>
    <div class="pill" onclick="ask(\"I am lost\")">📍 Lost</div>
  </div>

  <div class="inp-bar">
    <div class="inp-wrap">
      <textarea class="inp" id="inp" rows="1" placeholder="Describe your emergency…"
        oninput="autoH(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button class="mic" id="micBtn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>
    <button class="send" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script src="../lib/compromise.js"></script>
<script>
// ════════════════════════════════════════════════════════
//  RESQ AI — NLP Emergency Assistant
//  Uses compromise.js (350KB) + expanded matching engine
//  100% offline · No internet needed
// ════════════════════════════════════════════════════════

const chatEl = document.getElementById('chat');
let SR = null, isListening = false, ctx = [];

// ── KNOWLEDGE BASE ───────────────────────────────────────
// Each entry has:
//   tokens : individual words that score (each word = 1pt)
//   phrases: multi-word phrases that score higher (each = 3pts)
//   tag/label/answer/sos

const KB = [
  {
    id:'breathing', tag:'ts', label:'🆘 Breathing Emergency',
    tokens:['breathe','breathing','breath','suffocate','suffocating','airway','inhale','exhale','asphyxia','respiratory','oxygen','air','windpipe','trachea','asthma','wheeze','wheezing'],
    phrases:['cant breathe','cannot breathe','not breathing','hard to breathe','difficulty breathing','trouble breathing','short of breath','out of breath','no breath','breath stopped','stopped breathing','no air','losing breath','breath tight'],
    answer:`🫁 BREATHING EMERGENCY

Is the person CONSCIOUS?

► If YES and something is stuck (CHOKING):
1️⃣  Give 5 firm BACK BLOWS between shoulder blades
2️⃣  5 ABDOMINAL THRUSTS: stand behind, pull fist sharply inward + upward
3️⃣  Alternate until object is cleared

► If YES but no blockage (ASTHMA / RESPIRATORY):
1️⃣  Sit person upright — leaning slightly forward
2️⃣  Loosen any tight clothing around chest and neck
3️⃣  Use inhaler if available (2 puffs)
4️⃣  Keep them calm — anxiety makes it worse
5️⃣  Breathe together slowly — in 4 counts, out 4 counts

► If UNCONSCIOUS / NOT BREATHING:
1️⃣  Tilt head back, lift chin
2️⃣  30 chest compressions (fast, 2 inches deep)
3️⃣  2 rescue breaths — pinch nose, seal mouth
4️⃣  Repeat until breathing returns

⚠️  All breathing emergencies = SOS immediately`,
    sos:true
  },
  {
    id:'cardiac', tag:'ts', label:'❤️ Heart / Cardiac',
    tokens:['heart','cardiac','chest','coronary','pulse','heartbeat','palpitation','artery','infarction','angina','ecg','defibrillator'],
    phrases:['chest pain','heart attack','heart stopped','heart failure','chest tight','chest pressure','chest crushing','heart racing','no pulse','cardiac arrest','pain in chest','left arm pain','arm pain','jaw pain','shortness breath'],
    answer:`❤️ HEART ATTACK / CARDIAC ARREST

SIGNS: Chest crushing/pressure, left arm pain, jaw pain, sweating, nausea

IF CONSCIOUS (Heart Attack):
1️⃣  Sit or lie the person down — do NOT let them walk around
2️⃣  Loosen tight clothing
3️⃣  Give aspirin (300mg) to chew if available and not allergic
4️⃣  Stay calm and still — exertion makes it worse
5️⃣  Monitor breathing constantly

IF UNCONSCIOUS (Cardiac Arrest):
1️⃣  Check breathing for 10 seconds
2️⃣  Start CPR immediately:
      • Hands center of chest
      • Push HARD and FAST — 100/min, 2 inches deep
      • 30 compressions → 2 rescue breaths
3️⃣  Do NOT stop until person breathes or help arrives

⚠️  Cardiac arrest = SOS immediately — every second counts`,
    sos:true
  },
  {
    id:'bleeding', tag:'ti', label:'🩸 Bleeding / Wound',
    tokens:['bleed','blood','wound','cut','gash','stab','slash','laceration','puncture','injury','injured','rod','nail','glass','metal','spike','knife','sharp','hemorrhage','hemmorhage'],
    phrases:['bleeding badly','heavy bleeding','blood everywhere','wont stop bleeding','deep cut','deep wound','object stuck','metal stuck','rod stuck','nail stuck','blood loss','losing blood','profuse bleeding','cut artery'],
    answer:`🩸 BLEEDING / WOUND

1️⃣  Apply FIRM direct pressure with clean cloth — press HARD
2️⃣  Do NOT remove cloth if soaking through — add more on top
3️⃣  Elevate the injured limb above heart level
4️⃣  If object is embedded (rod/nail/glass):
      → Do NOT pull it out — stabilize it with cloth padding
      → Keep person still
5️⃣  Press continuously for 10+ minutes without releasing

TOURNIQUET (last resort — limb only):
→ Tie cloth tightly 2 inches ABOVE wound
→ Twist until bleeding stops
→ Note the time applied

⚠️  Arterial bleeding (spurting) = life threatening → SOS NOW`,
    sos:true
  },
  {
    id:'unconscious', tag:'ts', label:'😵 Unconscious / CPR',
    tokens:['unconscious','unresponsive','faint','fainted','coma','comatose','limp','revive','resuscitate','cpr','pulse','wake','awake','respond','response'],
    phrases:['not moving','cannot wake','cant wake','wont wake','passed out','fell down','collapsed','not responding','no response','no pulse','person fell','fell unconscious','blacked out','lost consciousness','not waking up'],
    answer:`😵 UNCONSCIOUS PERSON — Act Immediately

1️⃣  Shout "Are you OK?" and FIRMLY tap shoulder
2️⃣  If no response → call for help + check breathing:
      Tilt head back, lift chin, look-listen-feel for 10 sec

IF BREATHING:
→ Recovery position: roll onto side, head tilted back
→ Monitor breathing every 2 minutes

IF NOT BREATHING:
→ START CPR NOW:
1️⃣  Place heel of hand on CENTER of chest
2️⃣  Push DOWN 2 inches HARD and FAST (100/min)
3️⃣  30 compressions → 2 rescue breaths (pinch nose)
4️⃣  KEEP GOING until they breathe or help arrives

⚠️  Every minute without CPR = 10% less chance of survival
      → SOS immediately`,
    sos:true
  },
  {
    id:'burns', tag:'tf', label:'🔥 Burns',
    tokens:['burn','scald','blister','flame','heat','acid','chemical','hot','steam','fire','boiling'],
    phrases:['skin burned','hand burned','face burned','severe burn','chemical burn','boiling water','acid burn','burnt skin','fire burn'],
    answer:`🔥 BURNS — First Aid

1️⃣  Cool under RUNNING WATER for 20 minutes — NOT ice
2️⃣  Remove clothing and jewellery near burn (if NOT stuck to skin)
3️⃣  Cover loosely with clean non-stick cloth
4️⃣  Do NOT use butter, oil, toothpaste, or ice
5️⃣  Do NOT burst blisters — infection risk

SEVERITY:
• 1st degree (red, no blister): Cool water, cover
• 2nd degree (blisters): Cool water, cover, monitor
• 3rd degree (white/black, no pain): Cover only, SOS

⚠️  Larger than palm, or face/hands/genitals → SOS`,
    sos:false
  },
  {
    id:'fracture', tag:'ti', label:'🦴 Fracture',
    tokens:['fracture','bone','break','broke','broken','snap','crack','joint','dislocate','sprain','ankle','wrist','spine','rib'],
    phrases:['broken bone','broken leg','broken arm','broken wrist','bone sticking out','bone through skin','open fracture','compound fracture','bone snap','bone crack','twisted ankle','dislocated shoulder'],
    answer:`🦴 FRACTURE / BROKEN BONE

1️⃣  Do NOT try to straighten or push bone back
2️⃣  IMMOBILIZE with splint:
      • 2 rigid objects (sticks/boards) on both sides
      • Pad with cloth for comfort
      • Tie ABOVE and BELOW the fracture — NOT over it
3️⃣  Check circulation every 10 min:
      • Feel for pulse below injury
      • Check for numbness, coldness, pale skin
4️⃣  Keep person still and warm
5️⃣  For neck/spine injury: do NOT move at all

OPEN FRACTURE (bone through skin):
→ Cover with clean cloth — do NOT push bone back
→ Apply gentle pressure around (not on) wound
→ SOS immediately`,
    sos:false
  },
  {
    id:'seizure', tag:'ts', label:'⚡ Seizure',
    tokens:['seizure','convulsion','convulsing','epilepsy','epileptic','fit','fitting','spasm','twitch','shaking','tremor','jerking'],
    phrases:['having seizure','having a fit','body shaking uncontrollably','muscle spasm','losing control','body jerking','fell shaking','collapse shaking','convulsion attack'],
    answer:`⚡ SEIZURE — What to Do

DURING seizure:
1️⃣  Stay CALM — most seizures last 1-3 minutes
2️⃣  Clear area of hard/sharp objects
3️⃣  Cushion head with something soft
4️⃣  Do NOT hold down or restrain them
5️⃣  Do NOT put anything in their mouth
6️⃣  Turn them on their SIDE if possible (prevents choking)
7️⃣  Time the seizure

AFTER seizure:
1️⃣  Recovery position — on side
2️⃣  Speak calmly: "You're safe, stay still"
3️⃣  They may be confused for up to 30 minutes — this is normal

⚠️  Call SOS if:
  • Seizure lasts more than 5 minutes
  • Person does not regain consciousness
  • Multiple seizures in a row
  • First-ever seizure or injury during`,
    sos:false
  },
  {
    id:'allergy', tag:'ts', label:'🐝 Allergic Reaction',
    tokens:['allergy','allergic','reaction','anaphylaxis','anaphylactic','sting','bee','wasp','swollen','swelling','hives','rash','epipen','antihistamine'],
    phrases:['allergic reaction','throat swelling','can\'t swallow','tongue swelling','face swelling','bee sting','wasp sting','severe allergy','skin rash','full body rash','breathing after sting'],
    answer:`🐝 ALLERGIC REACTION

MILD (rash, hives, itching):
1️⃣  Remove allergen if known (sting, food, medication)
2️⃣  Apply cold pack to reduce swelling
3️⃣  Antihistamine tablet if available
4️⃣  Monitor closely for 2 hours

SEVERE — ANAPHYLAXIS (throat swelling, can't breathe, face swelling):
🚨 This is life-threatening — act in seconds
1️⃣  Use EpiPen if available — outer thigh, hold 10 seconds
2️⃣  Lay person FLAT — legs raised (unless breathing difficulty)
3️⃣  If no EpiPen: keep upright if breathing problems
4️⃣  If unconscious and not breathing → CPR
5️⃣  A second dose of EpiPen may be needed in 5-15 min

⚠️  Throat/tongue swelling = call SOS immediately`,
    sos:true
  },
  {
    id:'stroke', tag:'ts', label:'🧠 Stroke',
    tokens:['stroke','paralysis','paralyzed','slur','slurred','droop','drooping','numb','numbness','vision','headache','dizzy','confusion','confused','face','speech'],
    phrases:['face drooping','arm weakness','slurred speech','sudden headache','worst headache','one side weak','sudden confusion','sudden vision','cannot speak','cant speak','face droop','sudden nausea'],
    answer:`🧠 STROKE — Use FAST Test

F — FACE: Ask them to SMILE
    → One side drooping? = WARNING SIGN

A — ARMS: Ask to raise BOTH arms
    → One drifts or can't raise? = WARNING SIGN

S — SPEECH: Ask to say "The sky is blue"
    → Slurred or strange words? = WARNING SIGN

T — TIME: If ANY sign → Act NOW

What to do:
1️⃣  Note exact time symptoms started
2️⃣  Lay person down — head slightly elevated
3️⃣  Do NOT give food, drink, or aspirin
4️⃣  If unconscious → recovery position (on side)
5️⃣  Loosen tight clothing around neck

⚠️  Brain cells die every minute — SOS immediately
   "Time is brain" — treatment window is 4.5 hours`,
    sos:true
  },
  {
    id:'fire', tag:'tf', label:'🔥 Fire / Smoke',
    tokens:['fire','smoke','flame','blaze','fumes','ember','ash','arson','inferno'],
    phrases:['building fire','house fire','smoke everywhere','trapped fire','cant escape fire','fire spreading','fire alarm','smell smoke','inhaled smoke','smoke inhalation'],
    answer:`🔥 FIRE / SMOKE EMERGENCY

IF IN A BUILDING WITH FIRE:
1️⃣  Alert everyone — shout FIRE, pull alarm
2️⃣  CRAWL low — smoke rises, cleaner air near floor
3️⃣  Feel door with BACK of hand before opening
      → Hot door = fire behind, find another exit
4️⃣  Use STAIRS only — never elevator
5️⃣  Close doors behind you (slows fire spread)

IF TRAPPED:
1️⃣  Seal door gap with wet cloth
2️⃣  Signal from window — wave bright cloth, shout
3️⃣  Do NOT break window unless escape route below
4️⃣  Stay low, protect face

SMOKE INHALATION:
→ Wet cloth over nose/mouth
→ Get fresh air immediately
→ Cough deeply to clear airways

⚠️  Trigger SOS if trapped`,
    sos:true
  },
  {
    id:'flood', tag:'tw', label:'🌊 Flood',
    tokens:['flood','flooding','floodwater','water','rain','river','dam','tide','current','surge','inundation','submerge'],
    phrases:['water rising','flood rising','water coming inside','water level','rising water','swept by water','in floodwater','cant get out flood','water entering','rain flooding'],
    answer:`🌊 FLOOD SURVIVAL

IF INDOORS:
1️⃣  Move to HIGHEST floor immediately
2️⃣  Do NOT go to basement
3️⃣  Turn off electricity at main breaker (safely)
4️⃣  Move valuables and food to high shelf
5️⃣  Signal from window for rescue

IF CAUGHT IN FLOODWATER:
1️⃣  Do NOT walk in moving water — 6 inches knocks you down
2️⃣  If swept away: float on BACK, feet downstream
3️⃣  Feet act as bumpers against obstacles
4️⃣  Grab fixed object (tree, pole) to stop
5️⃣  Do NOT fight the current

⚠️  Never drive through floodwater
    Never drink floodwater — contaminated
    → Trigger SOS if trapped`,
    sos:true
  },

// ── TOKENIZER + MATCHER ──────────────────────────────────

let nlpReady = false;

function initNLP() {
  // compromise.js is loaded via script tag as window.nlp
  const fn = window.nlp || (typeof nlp !== 'undefined' ? nlp : null);
  if (fn) {
    try { fn('test'); nlpReady = true; } catch(e) { nlpReady = false; }
  }
  document.getElementById('nlpSt').textContent = nlpReady ? 'NLP Ready · Offline' : 'Offline Mode';
}

// Extract all individual words from text + NLP output
function tokenize(text) {
  // 1. Raw word split
  const raw = text.toLowerCase()
    .replace(/['']/g, '')       // remove apostrophes: can't → cant
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 1);

  // 2. NLP extraction (if available)
  const nlpFn = window.nlp || (typeof nlp !== 'undefined' ? nlp : null);
  let nlpWords = [];
  if (nlpReady && nlpFn) {
    try {
      const doc = nlpFn(text);
      const allNLP = [
        ...doc.nouns().out('array'),
        ...doc.verbs().out('array'),
        ...doc.adjectives().out('array')
      ];
      // Split compound NLP terms into individual words
      for (const term of allNLP) {
        const parts = term.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/);
        nlpWords.push(...parts.filter(w => w.length > 1));
      }
    } catch(e) {}
  }

  return [...new Set([...raw, ...nlpWords])];
}

function scoreEntry(entry, text, tokens) {
  const low = text.toLowerCase();
  let score = 0;

  // 1. Phrase matching (highest weight — 3pts each)
  for (const ph of entry.phrases) {
    if (low.includes(ph)) score += 3;
  }

  // 2. Token matching (1pt each)
  for (const tok of tokens) {
    if (entry.tokens.includes(tok)) score += 1;
  }

  // 3. Stem matching — partial word prefix (0.5pt each)
  for (const tok of tokens) {
    if (tok.length >= 4) {
      for (const kw of entry.tokens) {
        if (kw.length >= 4 && tok !== kw &&
            (tok.startsWith(kw.slice(0,5)) || kw.startsWith(tok.slice(0,5)))) {
          score += 0.5;
        }
      }
    }
  }

  return score;
}

function findBest(text) {
  const tokens = tokenize(text);
  let best = null, bestScore = 0;
  const scores = [];

  for (const entry of KB) {
    const s = scoreEntry(entry, text, tokens);
    scores.push({ entry, s });
    if (s > bestScore) { bestScore = s; best = entry; }
  }

  const confidence = Math.min(100, Math.round((bestScore / 8) * 100));
  return { entry: bestScore >= 1 ? best : null, confidence, tokens };
}

// ── RESPONSE BUILDER ─────────────────────────────────────

function buildReply(text) {
  const low = text.toLowerCase();

  // Greeting / general
  if (/^(hi|hello|hey|test|yo|ok|okay|hii|helo|namaste|hola)[\s!?]*$/.test(low.trim())) {
    return { html: greeting(), sos: false };
  }

  const { entry, confidence } = findBest(text);

  if (!entry) return { html: fallback(text), sos: false };

  ctx.push(entry);
  if (ctx.length > 5) ctx.shift();

  const tagHtml = `<div class="tag ${entry.tag}">${entry.label}</div>`;
  const confHtml = `<div class="conf"><div class="conf-fill" style="width:${confidence}%"></div></div><div class="conf-label">Confidence: ${confidence}%</div>`;
  const sosCard = entry.sos ? `<div class="sos-card"><div class="sos-card-t">⚠️ SOS RECOMMENDED</div><div style="font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:2px;">This situation may require immediate rescue. Broadcast now?</div><button class="sos-btn" onclick="location.href='/sos/index.html'">🆘 SEND SOS SIGNAL</button></div>` : '';

  return { html: `${tagHtml}${confHtml}${entry.answer}${sosCard}`, sos: entry.sos };
}

function greeting() {
  const name = localStorage.getItem('resq_name') || '';
  return `👋 Hey${name ? ' '+name : ''}! I'm RESQ AI — offline emergency assistant.\n\nI understand natural language. Just describe the situation:\n\n• "I can't breathe"\n• "Someone has chest pain"\n• "Water is rising fast"\n• "Person collapsed not moving"\n• "Building is on fire"\n• "Snake bit my leg"\n\nI'll give step-by-step guidance immediately.`;
}

function fallback(text) {
  // Try to give a helpful hint based on any word match
  const tokens = tokenize(text);
  return `I need more detail to give accurate guidance.\n\nTry being more specific:\n• What is happening? (fire, flooding, injury, collapse)\n• Where on the body? (if injury)\n• Is the person conscious?\n\nOr tap a quick button below for instant guidance.\n\nYou typed: "${text.trim()}"`;
}

// ── CHAT ENGINE ───────────────────────────────────────────

function addMsg(html, from) {
  const d = document.createElement('div');
  d.className = `row ${from}`;
  d.innerHTML = `<div class="av">${from==='bot'?'🤖':'👤'}</div><div class="bub">${html}</div>`;
  chatEl.appendChild(d);
  setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 50);
}

function showTyping() {
  const d = document.createElement('div');
  d.className = 'row bot'; d.id = 'typ';
  d.innerHTML = `<div class="av">🤖</div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function rmTyping() { const e = document.getElementById('typ'); if(e) e.remove(); }

function autoH(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }

function ask(text) { process(text); }
function send() {
  const el = document.getElementById('inp');
  const t = el.value.trim();
  if(!t) return;
  el.value = ''; el.style.height = 'auto';
  process(t);
}

function process(text) {
  addMsg(text, 'user');
  showTyping();
  const delay = 300 + Math.min(text.length * 6, 700);
  setTimeout(() => {
    rmTyping();
    const { html } = buildReply(text);
    addMsg(html, 'bot');
  }, delay);
}

// ── VOICE ─────────────────────────────────────────────────
function toggleMic() {
  const btn = document.getElementById('micBtn');
  const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SRClass) { addMsg('Voice input not supported on this device.', 'bot'); return; }
  if (isListening) { SR && SR.stop(); return; }
  SR = new SRClass(); SR.lang = 'en-US'; SR.interimResults = false;
  SR.onstart = () => { isListening = true; btn.classList.add('on'); };
  SR.onresult = (e) => { process(e.results[0][0].transcript); };
  SR.onerror = () => { isListening = false; btn.classList.remove('on'); };
  SR.onend = () => { isListening = false; btn.classList.remove('on'); SR = null; };
  SR.start();
}

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initNLP();
  setTimeout(() => addMsg(greeting(), 'bot'), 200);
});
