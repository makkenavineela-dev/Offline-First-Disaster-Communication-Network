<!DOCTYPE html>
<html>
  <head>
    <title>RESQ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body { margin: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; }
      p { color: #888; font-family: sans-serif; font-size: 14px; }
    </style>
  </head>
  <body>
    <p>Loading RESQ...</p>
    <script>
      // Only redirect to splash when loaded at the true root ("/").
      // If Capacitor's local server falls back to this file for a missing page
      // (e.g. /dashboard/ not found), we must NOT redirect — that creates an
      // infinite loop: missing page → index.html → splash → user taps link →
      // missing page again. In that case, show an error message instead.
      var path = window.location.pathname;
      if (path === '/' || path === '/index.html') {
        window.location.replace('/splash/index.html');
      } else {
        document.querySelector('p').textContent =
          'App pages not found (' + path + '). Run BUILD_ANDROID.bat then rebuild in Android Studio.';
      }
    </script>
  </body>
</html>
